services:
  - type: web
    name: spending-tracker-webhook
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT tools.webhook_server:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: OWNER_WHATSAPP_NUMBER
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: GOOGLE_TOKEN_B64
        sync: false

  - type: cron
    name: weekly-spending-summary
    env: python
    plan: free
    schedule: "0 8 * * 0"
    buildCommand: pip install -r requirements.txt
    startCommand: python tools/weekly_summary.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: OWNER_WHATSAPP_NUMBER
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: GOOGLE_TOKEN_B64
        sync: false
